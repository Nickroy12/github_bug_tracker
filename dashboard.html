<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="shadow-md sticky top-0 z-10 bg-white">
        <nav class="container mx-auto flex justify-between py-4 ">
          <div class="logo flex items-center">
             <i class="fa-brands fa-github  text-5xl"></i>
              <h2 class="text-xl font-bold ">GitHub Issues Tracker</h2>
          </div>
          <div class="flex justify-between">
            <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" id="searchInput" required placeholder="Search" />
</label>
<button id="searchBtn" class="btn btn-primary">Search</button>
          </div>
        </nav>
    </header>
    <main >
      <div class="container mx-auto p-4 " >
        <section class="btn-container flex bg-slate-50 shadow gap-3 p-2 mb-4">
         <button id="allBtn" class="btn btn-primary ">All</button>
         <button id="openBtn" class="btn btn-outline ">Open</button>
         <button id="closeBtn" class="btn btn-outline ">Close</button>
        </section>
        <section class="flex justify-between bg-slate-50 shadow gap-3 p-2">
          <div class="count flex items-center gap-5">
            <img src="image/Aperture.png" alt="Aperture">
            <div >
              <h2 class="text-xl font-bold"><span id="issueCount">0</span> Issues</h2>
              <p>Track and manage your project issues</p>
            </div>

          </div>
           <div class="status-bar flex gap-3">
           <div class="font-bold"><span class="status bg-green-500"></span> Open</div> 
           <div class="font-bold"><span class="status bg-red-500"></span> Close</div> 
           </div>
        </section>
        <section id="issuContainer" class="grid grid-cols-1 md:grid-cols-4 gap-3 p-5">

        </section>
      <section id="spinner" class=" flex justify-center items-center hidden p-20">
            <span  class="loading loading-bars  loading-xl"></span>
          </section>
<dialog id="popupbox" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
      <div id="modalBody" class="space-y-5">
      
      </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
      </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
